name: venues-probe

# 一次性：在 Commons 检索场馆图片候选（文件名/授权/作者），供人工挑选后固定下载
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/venues-probe.yml"

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Commons 场馆图检索
        shell: bash
        run: |
          python3 - <<'EOF2'
          import json, urllib.parse, urllib.request

          UA = {"User-Agent": "tennislive-venue-probe/1.0 (github.com/robertyang87/tennislive)"}

          def get(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          API = "https://commons.wikimedia.org/w/api.php"

          def search(term, limit=6):
              q = urllib.parse.urlencode({
                  "action": "query", "format": "json", "list": "search",
                  "srsearch": term, "srnamespace": 6, "srlimit": limit,
              })
              return [hit["title"] for hit in get(f"{API}?{q}")["query"]["search"]]

          def info(titles):
              q = urllib.parse.urlencode({
                  "action": "query", "format": "json", "prop": "imageinfo",
                  "iiprop": "url|extmetadata|size", "titles": "|".join(titles),
                  "iiurlwidth": 1600,
              })
              pages = get(f"{API}?{q}")["query"]["pages"]
              out = []
              for p in pages.values():
                  for ii in p.get("imageinfo") or []:
                      md = ii.get("extmetadata") or {}
                      lic = (md.get("LicenseShortName") or {}).get("value", "?")
                      artist = (md.get("Artist") or {}).get("value", "?")[:80]
                      out.append((p.get("title"), lic, artist,
                                  ii.get("width"), ii.get("height"),
                                  ii.get("thumburl") or ii.get("url")))
              return out

          TERMS = [
              ("dc", "FitzGerald Tennis Center Washington"),
              ("dc2", "Rock Creek Park Tennis stadium"),
              ("canada", "Sobeys Stadium tennis Toronto"),
              ("canada2", "IGA Stadium tennis Montreal"),
              ("cincy", "Lindner Family Tennis Center"),
              ("uso", "Arthur Ashe Stadium interior"),
          ]
          for key, term in TERMS:
              print("=" * 76)
              print("##", key, "|", term)
              try:
                  titles = search(term)
                  for t, lic, artist, w, h, url in info(titles):
                      ok = any(s in lic for s in ("CC BY", "CC0", "Public domain", "PD"))
                      print(f"{'OK ' if ok else 'NO '}| {lic:<16} | {w}x{h} | {t}")
                      print(f"     作者: {artist}")
                      print(f"     URL: {url}")
              except Exception as e:
                  print("FAIL", e)
          EOF2
