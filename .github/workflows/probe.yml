name: probe-data-sources

# 手动触发：在真实网络环境（GitHub Actions）中探测数据源结构。
# 当前目标：① 比分接口里球员 ID 的位置；② 全量实时排名的可用接口。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 球员ID与全量排名探测
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, urllib.request, datetime

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126 Safari/537.36"}

          def get(url, extra=None, as_json=True):
              headers = dict(UA)
              if extra:
                  headers.update(extra)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  body = r.read().decode()
                  return json.loads(body) if as_json else body

          print("=" * 70)
          print("== 1) 比分接口 competitor 结构（找球员 ID）")
          d = datetime.date.today() - datetime.timedelta(days=1)
          sb = get(f"https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard?dates={d:%Y%m%d}")
          aid = None
          for ev in sb.get("events") or []:
              for grp in ev.get("groupings") or []:
                  for comp in grp.get("competitions") or []:
                      cs = comp.get("competitors") or []
                      if cs:
                          c = cs[0]
                          print("competitor keys:", sorted(c.keys()))
                          print("competitor id/uid:", c.get("id"), "|", c.get("uid"))
                          ath = c.get("athlete")
                          if isinstance(ath, dict):
                              print("athlete keys:", sorted(ath.keys()))
                              print("athlete sample:", json.dumps(ath, ensure_ascii=False)[:500])
                          rost = c.get("roster")
                          if isinstance(rost, dict):
                              a0 = (rost.get("athletes") or [{}])[0]
                              print("roster athlete keys:", sorted(a0.keys()) if isinstance(a0, dict) else a0)
                          # 从 uid 提取 athlete id：形如 s:850~l:851~a:12345
                          uid = c.get("uid") or ""
                          for part in uid.split("~"):
                              if part.startswith("a:"):
                                  aid = part[2:]
                      break
                  break
              break
          print("提取到的 athlete id:", aid)

          print("=" * 70)
          print("== 2) ESPN 单球员接口的实时排名字段")
          if aid:
              for url in (
                  f"https://site.web.api.espn.com/apis/common/v3/sports/tennis/atp/athletes/{aid}",
                  f"https://site.web.api.espn.com/apis/common/v3/sports/tennis/atp/athletes/{aid}/overview",
                  f"https://sports.core.api.espn.com/v2/sports/tennis/leagues/atp/athletes/{aid}",
              ):
                  try:
                      data = get(url)
                      s = json.dumps(data, ensure_ascii=False)
                      print(url, "OK keys:", list(data)[:12])
                      import re
                      for mtc in re.finditer(r'"(rank|current|displayRank)[^,}]{0,40}', s[:8000]):
                          print("   rank-ish:", mtc.group(0)[:60])
                  except Exception as e:
                      print(url, "FAIL", e)

          print("=" * 70)
          print("== 3) WTA 官方 API 变体重试")
          for url in (
              "https://api.wtatennis.com/tennis/players/ranked?page=0&pageSize=100&type=rankSingles&sort=asc&name=&metric=SINGLES&at=",
              "https://api.wtatennis.com/tennis/players/ranked?type=rankSingles&sort=asc&pageSize=100&page=0",
          ):
              try:
                  data = get(url, extra={"account": "wta", "Origin": "https://www.wtatennis.com",
                                         "Referer": "https://www.wtatennis.com/rankings/singles"})
                  rows = data if isinstance(data, list) else data.get("content") or []
                  print(url[:80], "rows:", len(rows))
                  if rows:
                      print("  sample:", json.dumps(rows[0], ensure_ascii=False)[:300])
              except Exception as e:
                  print(url[:80], "FAIL", e)
          EOF
