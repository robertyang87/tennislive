name: probe-data-sources

# 手动触发：在 GitHub Actions 出口网络中检查比分聚合源与授权统计配置。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
      SPORTRADAR_ACCESS_LEVEL: ${{ vars.SPORTRADAR_ACCESS_LEVEL || 'trial' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 tennislive
        run: pip install -q -e .

      - name: 生成无图片探测包
        shell: bash
        run: |
          tennislive digest --date today --outdir probe-output --no-cards
          REPORT=$(find probe-output -name coverage.txt -print -quit)
          echo "===== 数据源与赛事覆盖 ====="
          cat "$REPORT"

      - name: 临时探测：ESPN/SofaScore 是否有逐场技术统计端点
        shell: bash
        run: |
          MATCH_ID=$(python3 -c "
          import json
          d = json.load(open('$(find probe-output -name digest.json -print -quit)'))
          finished = [m for m in d.get('results', []) if m.get('status') == 'finished']
          print((finished[0]['match_id']) if finished else '')
          ")
          echo "sample match_id=$MATCH_ID"
          EVENT_ID="${MATCH_ID%%:*}"
          COMP_ID="${MATCH_ID##*:}"
          python3 tools/probe_stats_endpoints.py "$EVENT_ID" "$COMP_ID" wta || true

      - name: 上传探测报告
        uses: actions/upload-artifact@v4
        with:
          name: source-probe-${{ github.run_number }}
          path: probe-output/**/coverage.txt
