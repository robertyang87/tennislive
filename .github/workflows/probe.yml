name: probe-data-sources

# 手动触发：在真实网络环境（GitHub Actions）中探测数据源结构。
# 当前目标：ATP/WTA 排名接口的 JSON 结构。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 分析排名接口 JSON 结构
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, urllib.request

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}

          def get(url, extra=None):
              headers = dict(UA)
              if extra:
                  headers.update(extra)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          print("=" * 70)
          print("== ESPN ATP rankings")
          for url in (
              "https://site.api.espn.com/apis/site/v2/sports/tennis/atp/rankings",
              "https://sports.core.api.espn.com/v2/sports/tennis/leagues/atp/rankings",
          ):
              try:
                  data = get(url)
                  print(f"\nURL OK: {url}")
                  print("top-level keys:", sorted(data.keys()) if isinstance(data, dict) else type(data))
                  s = json.dumps(data, ensure_ascii=False)
                  print("size:", len(s))
                  print(s[:3000])
                  break
              except Exception as e:
                  print(f"FAIL {url}: {e}")

          print("=" * 70)
          print("== WTA official rankings (Pulselive)")
          try:
              data = get(
                  "https://api.wtatennis.com/tennis/players/ranked?page=0&pageSize=20&type=rankSingles&sort=asc&metric=SINGLES&at=latest&nationality=",
                  extra={"account": "wta", "Origin": "https://www.wtatennis.com"},
              )
              print("type:", type(data))
              s = json.dumps(data, ensure_ascii=False)
              print("size:", len(s))
              print(s[:3500])
          except Exception as e:
              print("FAIL:", e)
          EOF
