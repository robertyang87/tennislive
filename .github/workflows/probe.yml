name: probe-data-sources

# 手动触发：在真实网络环境（GitHub Actions）中探测数据源结构。
# 当前目标：① ESPN 单球员接口的排名字段；② WTA 全量分页；③ 双打 roster 的球员 ID。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 排名字段深挖
        shell: bash
        run: |
          python3 - <<'EOF2'
          import json, re, urllib.request, datetime

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126 Safari/537.36"}

          def get(url, extra=None):
              headers = dict(UA)
              if extra:
                  headers.update(extra)
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          print("=" * 70)
          print("== 1) ESPN 单球员 v3 接口全文找 rank")
          for league, aid in (("wta", "3042"),):
              data = get(f"https://site.web.api.espn.com/apis/common/v3/sports/tennis/{league}/athletes/{aid}")
              ath = data.get("athlete") or {}
              print("athlete keys:", sorted(ath.keys()))
              s = json.dumps(data, ensure_ascii=False)
              hits = set(m.group(0)[:70] for m in re.finditer(r'"[a-zA-Z]*[Rr]ank[a-zA-Z]*"\s*:\s*[^,}]{1,30}', s))
              for h in sorted(hits)[:15]:
                  print("   ", h)

          print("=" * 70)
          print("== 2) WTA 全量分页（pageSize=500 / 翻页）")
          W = "https://api.wtatennis.com/tennis/players/ranked?page={p}&pageSize={n}&type=rankSingles&sort=asc&name=&metric=SINGLES&at="
          H = {"account": "wta", "Origin": "https://www.wtatennis.com",
               "Referer": "https://www.wtatennis.com/rankings/singles"}
          for p, n in ((0, 500), (1, 100), (4, 100)):
              try:
                  rows = get(W.format(p=p, n=n), extra=H)
                  rows = rows if isinstance(rows, list) else rows.get("content") or []
                  last = rows[-1] if rows else {}
                  print(f"page={p} size={n} -> rows:{len(rows)} last_rank:{last.get('ranking')}")
              except Exception as e:
                  print(f"page={p} size={n} FAIL {e}")

          print("=" * 70)
          print("== 3) 双打 roster 球员 ID 结构")
          d = datetime.date.today() - datetime.timedelta(days=1)
          sb = get(f"https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard?dates={d:%Y%m%d}")
          found = False
          for ev in sb.get("events") or []:
              for grp in ev.get("groupings") or []:
                  for comp in grp.get("competitions") or []:
                      for c in comp.get("competitors") or []:
                          rost = c.get("roster")
                          if isinstance(rost, dict) and rost.get("athletes"):
                              a0 = rost["athletes"][0]
                              print("roster athlete keys:", sorted(a0.keys()))
                              print("sample:", json.dumps(a0, ensure_ascii=False)[:400])
                              print("competitor id/uid:", c.get("id"), c.get("uid"))
                              found = True
                              break
                      if found: break
                  if found: break
              if found: break
          if not found:
              print("昨天没有双打数据（或结构不同）")
          EOF2
