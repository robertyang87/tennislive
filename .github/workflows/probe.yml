name: probe-data-sources

# 手动触发：在真实网络环境（GitHub Actions）中探测数据源结构。
# 当前目标：live-tennis.eu 实时排名页的 HTML 结构（ATP 全量源）。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: live-tennis.eu 结构探测
        shell: bash
        run: |
          python3 - <<'EOF2'
          import re, urllib.request

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126 Safari/537.36"}

          def get(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode("utf-8", "ignore")

          for url in (
              "https://live-tennis.eu/en/atp-live-ranking",
              "https://live-tennis.eu/en/wta-live-ranking",
          ):
              try:
                  html = get(url)
                  print("=" * 70)
                  print(url, "OK len:", len(html))
                  # 找表格行样本
                  rows = re.findall(r"<tr[^>]*>.*?</tr>", html, re.S)
                  print("tr rows:", len(rows))
                  for row in rows[2:5]:
                      print("ROW:", re.sub(r"\s+", " ", row)[:400])
                  # 看第 300 名附近是否存在（全量验证）
                  m = re.search(r">\s*300\s*<", html)
                  print("包含第300名:", bool(m))
              except Exception as e:
                  print(url, "FAIL", e)
          EOF2
