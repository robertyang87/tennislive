name: probe-data-sources

# 手动触发：在 GitHub Actions 出口网络中检查比分聚合源与授权统计配置。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
      SPORTRADAR_ACCESS_LEVEL: ${{ vars.SPORTRADAR_ACCESS_LEVEL || 'trial' }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 tennislive
        run: pip install -q -e .

      - name: 探测 RapidAPI 网球数据源（临时）
        shell: bash
        run: python tools/probe_rapidapi_tennis.py

      - name: 查找 2025 法网纳达尔告别仪式三人同框照片（临时）
        shell: bash
        run: python tools/probe_rg2025_ceremony.py

      - name: 生成无图片探测包
        shell: bash
        run: |
          tennislive digest --date today --outdir probe-output --no-cards
          REPORT=$(find probe-output -name coverage.txt -print -quit)
          echo "===== 数据源与赛事覆盖 ====="
          cat "$REPORT"

      - name: 上传探测报告
        uses: actions/upload-artifact@v4
        with:
          name: source-probe-${{ github.run_number }}
          path: probe-output/**/coverage.txt
