name: probe-data-sources

# 手动触发：live-tennis.eu 数据行结构抽样。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 数据行抽样
        shell: bash
        run: |
          python3 - <<'EOF2'
          import re, urllib.request

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126 Safari/537.36"}

          def get(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode("utf-8", "ignore")

          html = get("https://live-tennis.eu/en/atp-live-ranking")
          rows = re.findall(r"<tr[^>]*>(?:(?!</tr>).)*</tr>", html, re.S)
          data_rows = [r for r in rows if re.search(r">\s*\d{1,3}\.?\s*</td>", r) and "(" in r]
          print("疑似数据行:", len(data_rows))
          for r in data_rows[:2] + data_rows[299:300]:
              print("ROW:", re.sub(r"\s+", " ", r)[:600])
              print("---")
          EOF2
