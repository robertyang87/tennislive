name: probe-data-sources

# 手动触发：在真实网络环境（GitHub Actions）中探测数据源结构，
# 把 ESPN 接口的 JSON 结构摘要打印到日志。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 分析 ESPN scoreboard JSON 结构
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, urllib.request, datetime

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}

          def get(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          def head_status(url):
              req = urllib.request.Request(url, headers=UA, method="HEAD")
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status, r.headers.get("content-type")
              except Exception as e:
                  return getattr(e, "code", str(e)), None

          today = datetime.date.today().strftime("%Y%m%d")
          for league in ("atp", "wta"):
              print(f"\n{'='*70}\n== {league.upper()} scoreboard {today}\n{'='*70}")
              data = get(f"https://site.api.espn.com/apis/site/v2/sports/tennis/{league}/scoreboard?dates={today}")
              print("top-level keys:", sorted(data.keys()))
              events = data.get("events", [])
              print(f"events: {len(events)}")
              for ev in events[:3]:
                  print(f"\n-- event keys: {sorted(ev.keys())}")
                  print(f"   name={ev.get('name')!r} id={ev.get('id')} date={ev.get('date')} endDate={ev.get('endDate')}")
                  groupings = ev.get("groupings")
                  comps_direct = ev.get("competitions")
                  print(f"   has groupings: {bool(groupings)}; direct competitions: {len(comps_direct or [])}")
                  if groupings:
                      for g in groupings:
                          gi = g.get("grouping", {})
                          print(f"   grouping: slug={gi.get('slug')!r} displayName={gi.get('displayName')!r} comps={len(g.get('competitions') or [])}")

              # 找一场单打样例 + 一场双打样例，完整打印
              def find_comps(data):
                  for ev in data.get("events", []):
                      if ev.get("groupings"):
                          for g in ev["groupings"]:
                              for c in g.get("competitions") or []:
                                  yield ev, g.get("grouping", {}).get("displayName"), c
                      else:
                          for c in ev.get("competitions") or []:
                              yield ev, None, c

              singles = doubles = None
              statuses, rounds, notes_seen = set(), set(), set()
              n = 0
              for ev, gname, c in find_comps(data):
                  n += 1
                  st = (c.get("status") or {}).get("type") or {}
                  statuses.add((st.get("state"), st.get("description")))
                  rnd = c.get("round")
                  if isinstance(rnd, dict):
                      rounds.add(str(rnd.get("displayName") or rnd))
                  else:
                      rounds.add(str(rnd))
                  for note in c.get("notes") or []:
                      notes_seen.add(str(note.get("headline"))[:60])
                  comps = c.get("competitors") or []
                  if comps and singles is None and (gname or "").lower().find("doubles") < 0:
                      singles = (gname, c)
                  if comps and doubles is None and (gname or "").lower().find("doubles") >= 0:
                      doubles = (gname, c)
              print(f"\n   total competitions: {n}")
              print(f"   status variants: {statuses}")
              print(f"   round variants: {sorted(rounds)[:12]}")
              print(f"   notes headlines: {sorted(notes_seen)[:8]}")
              if singles:
                  print(f"\n-- SINGLES SAMPLE (grouping={singles[0]!r}):")
                  print(json.dumps(singles[1], ensure_ascii=False, indent=1)[:5500])
              if doubles:
                  print(f"\n-- DOUBLES SAMPLE (grouping={doubles[0]!r}):")
                  print(json.dumps(doubles[1], ensure_ascii=False, indent=1)[:4000])

              # 头像 URL 探测
              for ev, gname, c in find_comps(data):
                  ath = (c.get("competitors") or [{}])[0].get("athlete") or {}
                  aid = ath.get("id")
                  if aid:
                      url = f"https://a.espncdn.com/i/headshots/tennis/players/full/{aid}.png"
                      print(f"\n   headshot probe {ath.get('displayName')}: {url} -> {head_status(url)}")
                      break
          EOF
