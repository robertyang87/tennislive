name: probe-data-sources

# 手动触发：在 GitHub Actions 出口网络中检查比分聚合源与授权统计配置。
on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/probe.yml"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
      SPORTRADAR_ACCESS_LEVEL: ${{ vars.SPORTRADAR_ACCESS_LEVEL || 'trial' }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 tennislive
        run: pip install -q -e .

      - name: 探测 RapidAPI 网球数据源（临时）
        shell: bash
        run: python tools/probe_rapidapi_tennis.py

      - name: 替换郑钦文封面图（临时）
        shell: bash
        run: python tools/probe_cover_swap.py

      - name: 提交新封面图（临时）
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/players/zheng-qinwen.jpg
          if git diff --cached --quiet; then
            echo "没有新照片，跳过提交"
          else
            git commit -m "content: swap zheng-qinwen cover to a real 2024 AO quarterfinal photo"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: 生成无图片探测包
        shell: bash
        run: |
          tennislive digest --date today --outdir probe-output --no-cards
          REPORT=$(find probe-output -name coverage.txt -print -quit)
          echo "===== 数据源与赛事覆盖 ====="
          cat "$REPORT"

      - name: 上传探测报告
        uses: actions/upload-artifact@v4
        with:
          name: source-probe-${{ github.run_number }}
          path: probe-output/**/coverage.txt
