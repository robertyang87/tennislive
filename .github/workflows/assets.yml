name: assets

# 一次性/按需：下载国旗小图等静态资源并提交回仓库
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pillow
      - run: python tools/fetch_flags.py
      # 个别图片抓取失败（Commons 限流/无合规候选）不阻断提交已成功的部分
      - run: python tools/fetch_venues.py || echo "::warning::some assets failed to fetch"
      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/flags assets/venues assets/players assets/trivia
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "assets: flags and licensed venue/player images for story cards"
          git pull --rebase origin main
          git push
