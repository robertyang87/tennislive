name: flash-report

# 热点雷达：全天每 15 分钟检测传播窗口内的重点赛果，自动生成
# 小红书单场标题、文案和首图，提交图片后再推送到微信待发布。
on:
  schedule:
    # 避开整点高峰；GitHub 定时可能延迟，因此保留四个错峰检查窗口。
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flash-report
  cancel-in-progress: false

jobs:
  flash:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      WECHAT_API_PROXY: ${{ secrets.WECHAT_API_PROXY }}
      WECHAT_MODE: ${{ vars.WECHAT_MODE || 'off' }}
      # 卡片主题：dark=品牌深绿（默认）/ light=奶油浅色
      TENNISLIVE_THEME: ${{ vars.TENNISLIVE_THEME || 'dark' }}
      TENNISLIVE_FONT: assets/fonts/NotoSansSC-Regular-sub.ttf
      TENNISLIVE_FONT_BOLD: assets/fonts/NotoSansSC-Bold-sub.ttf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 tennislive
        run: pip install -q -e .

      - name: 检测并生成热点包
        id: generate
        run: |
          rm -f .flash-publish.json
          tennislive flash --outdir output --no-publish --manifest .flash-publish.json
          if [ -f .flash-publish.json ] && jq -e '.items | length > 0' .flash-publish.json >/dev/null; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 提交战报与状态
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          if git diff --cached --quiet; then
            echo "没有新战报"
          else
            git commit -m "content: flash report $(date -u +%H:%MZ)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: 推送小红书热点待发布包到微信
        if: steps.generate.outputs.has_new == 'true' && env.PUSHPLUS_TOKEN != ''
        run: |
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          tennislive publish flash --manifest .flash-publish.json
