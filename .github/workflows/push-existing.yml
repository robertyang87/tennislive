name: Push existing content to PlusPlus

on:
  workflow_dispatch:
    inputs:
      date:
        description: Content date (YYYY-MM-DD)
        required: false
        default: ""
      scope:
        description: Existing package to push
        required: true
        type: choice
        options:
          - main
          - knowledge
        default: main
  push:
    branches: [main]
    paths:
      - "output/**/knowledge/**"
      - ".github/workflows/push-existing.yml"

permissions:
  contents: read

jobs:
  push-existing:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[pushplus]') || contains(github.event.head_commit.message, '[push-knowledge]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -q -e .
      - name: Push existing package
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_SECRET_KEY: ${{ secrets.PUSHPLUS_SECRET_KEY }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_SCOPE: ${{ inputs.scope }}
          TENNISLIVE_PUSHPLUS_IMAGE_SETTLE_SECONDS: '20'
        run: |
          DATE="${INPUT_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          SCOPE="${INPUT_SCOPE:-main}"
          if [ "$SCOPE" = "knowledge" ]; then
            OUT_DIR="output/${DATE}/knowledge"
          else
            OUT_DIR="output/${DATE}"
          fi
          test -s "${OUT_DIR}/push.html"
          test -s "${OUT_DIR}/xiaohongshu.txt"
          test -n "${PUSHPLUS_TOKEN}"
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          tennislive publish pushplus --dir "${OUT_DIR}"
