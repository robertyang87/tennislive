name: daily-tennis-digest

# 每天北京时间早间生成内容包（昨夜赛果 + 今日赛程）。这是材料生成
# 窗口，不是强制发布时间；提交回仓库并按配置推送，也可手动触发。
# GitHub 定时任务在 :00/:30 高峰时段可能被延迟或丢弃，
# 因此：主班次避开热门分钟 + 备份班次带幂等检查兜底。
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily.yml"
      - "assets/venues/**"
      - "data/venue_assets.json"
      - "data/official_schedule_sources.json"
      - "src/tennislive/sources/**"
      - "src/tennislive/models.py"
      - "pyproject.toml"
      - "src/tennislive/render/**"
      - "src/tennislive/research/**"
      - "src/tennislive/video/**"
      - "src/tennislive/cli.py"
  schedule:
    - cron: "17 23 * * *"   # 主班次：23:17 UTC = 次日 07:17 北京时间
    - cron: "5 0 * * *"     # 备份班次：00:05 UTC = 08:05 北京时间（当日已生成则跳过）
  workflow_dispatch:
    inputs:
      date:
        description: "基准日期（YYYY-MM-DD，北京时间；留空=今天）"
        required: false
        default: ""
      push_scope:
        description: "推送范围（生成内容不受影响）"
        required: false
        type: choice
        options:
          - all
          - knowledge-only
          - main-only
          - none
        default: all

permissions:
  contents: write
  models: read

concurrency:
  group: daily-digest
  cancel-in-progress: false

# A commit explicitly marked [pushplus] may replay the current day's package.

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 发布相关 Secrets（未配置则对应步骤自动跳过）
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      WECHAT_API_PROXY: ${{ secrets.WECHAT_API_PROXY }}
      # 公众号模式：off（默认，只生成文件）/ draft（存草稿箱）/ publish（直接发布）
      WECHAT_MODE: ${{ vars.WECHAT_MODE || 'off' }}
      # 卡片主题：dark=品牌深绿（默认）/ light=奶油浅色
      TENNISLIVE_THEME: ${{ vars.TENNISLIVE_THEME || 'dark' }}
      # 公众号样式：pic=图片消息（小红书式竖图+文字，默认）/ article=传统图文
      WECHAT_STYLE: ${{ vars.WECHAT_STYLE || 'pic' }}
      # 授权赛后技术统计（未配置时自动降级为比分结构复盘）
      SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
      SPORTRADAR_ACCESS_LEVEL: ${{ vars.SPORTRADAR_ACCESS_LEVEL || 'trial' }}
      # 无需额外 AI key：GitHub Models 只改写已有证据，不检索或编造新闻。
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1' }}
      TENNISLIVE_AI_EDITORIAL: ${{ vars.TENNISLIVE_AI_EDITORIAL || 'off' }}
      # 从官方巡回赛视频页选择与当日球员相关的片段，生成中文竖版视频。
      TENNISLIVE_OFFICIAL_VIDEO: ${{ vars.TENNISLIVE_OFFICIAL_VIDEO || 'on' }}
      # 知识帖配图：官方媒体、Commons、Openverse 多源检索，全部保留来源与机构署名。
      TENNISLIVE_VISUAL_FETCH: ${{ vars.TENNISLIVE_VISUAL_FETCH || 'on' }}
      # 严格生产门槛：人物、年份、赛事/地点、清晰度与来源缺一项即自动换题。
      TENNISLIVE_VISUAL_STRICT: ${{ vars.TENNISLIVE_VISUAL_STRICT || 'on' }}
      # 最多按新闻价值顺序尝试 6 个题材，避免单一题材素材不足拖垮整期。
      TENNISLIVE_VISUAL_CANDIDATES: ${{ vars.TENNISLIVE_VISUAL_CANDIDATES || '6' }}
      # 日报/热点封面：只抓取头条球员本人赛场照；失败时保留本地已核验人物资产。
      TENNISLIVE_COVER_VISUAL_FETCH: ${{ vars.TENNISLIVE_COVER_VISUAL_FETCH || 'on' }}
      TENNISLIVE_COVER_ATP_OFFICIAL: ${{ vars.TENNISLIVE_COVER_ATP_OFFICIAL || 'on' }}
      TENNISLIVE_COVER_WTA_OFFICIAL: ${{ vars.TENNISLIVE_COVER_WTA_OFFICIAL || 'on' }}
      # Flickr public feed as an additional discovery source; exact-match and
      # person/emotion/quality gates remain mandatory before publishing.
      TENNISLIVE_COVER_FLICKR: ${{ vars.TENNISLIVE_COVER_FLICKR || 'on' }}
      # 日报封面必须通过动作/情绪场景、清晰度和 3:4 安全裁切门禁。
      TENNISLIVE_COVER_VISUAL_STRICT: ${{ vars.TENNISLIVE_COVER_VISUAL_STRICT || 'on' }}
      TENNISLIVE_COVER_VISUAL_MIN_SCORE: ${{ vars.TENNISLIVE_COVER_VISUAL_MIN_SCORE || '72' }}
    steps:
      - uses: actions/checkout@v4

      - name: 手动任务同步最新主分支
        if: github.event_name == 'workflow_dispatch'
        run: git pull --ff-only origin "${{ github.ref_name }}"

      - name: 幂等检查（备份班次：当日内容已存在则跳过）
        id: guard
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          QA_FILE="output/$TODAY/qa.txt"
          if [ "${{ github.event_name }}" = "schedule" ] \
             && [ -f "output/$TODAY/digest.json" ] \
             && [ -f "$QA_FILE" ] \
             && ! grep -q '^\[FATAL\]' "$QA_FILE"; then
            echo "今日内容已生成且通过质量闸门，本次跳过"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装中文字体（卡片图需要）
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装 tennislive
        if: steps.guard.outputs.skip != 'true'
        run: pip install -q -e ".[webrender,visualqa,dev]"

      - name: 缓存 Chromium（HTML 卡片渲染）
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: 安装 Chromium
        if: steps.guard.outputs.skip != 'true'
        run: python -m playwright install --with-deps chromium

      - name: 安装视频渲染器
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 校验网球故事全局生成规则
        if: steps.guard.outputs.skip != 'true'
        run: pytest -q tests/test_render.py -k "knowledge or semantic or abbreviated_year"

      - name: 生成每日内容包
        if: steps.guard.outputs.skip != 'true'
        id: gen
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then DATE_ARG="today"; fi
          # 计算实际输出目录（北京时间日期）
          OUT_DIR=$(python -c "from tennislive.timeutil import parse_date_arg; print('output/' + parse_date_arg('$DATE_ARG').isoformat())")
          echo "outdir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          # 同日重跑必须重新生成知识包，不能复用仓库里上一次的旧图片与质检结果。
          rm -rf "$OUT_DIR/knowledge"
          # 封面报告同样不可复用；选择器异常或当日没有合格图片时，旧报告
          # 不能让后续发布门禁误判为通过。
          rm -f "$OUT_DIR/cover_visual.json"
          set +e
          TENNISLIVE_AI_EDITORIAL=off tennislive digest --date "$DATE_ARG" --outdir output 2>&1 | tee "$OUT_DIR.digest.log"
          CODE=${PIPESTATUS[0]}
          set -e
          if [ -f "$OUT_DIR/qa.txt" ]; then
            echo "----- qa.txt -----"
            cat "$OUT_DIR/qa.txt"
          fi
          if [ -f "$OUT_DIR/qa.txt" ] && grep -q '^\[FATAL\]' "$OUT_DIR/qa.txt"; then
            echo "::error file=$OUT_DIR/qa.txt::内容质检包含 FATAL，本次任务禁止提交和发布"
            exit 2
          fi
          if [ "$CODE" -ne 0 ]; then
            echo "::error::$OUT_DIR 生成命令以状态码 $CODE 失败，本次任务禁止提交和发布"
            exit "$CODE"
          fi
          ls -la "$OUT_DIR"

      - name: Upload digest failure diagnostics
        if: failure() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-failure-${{ github.run_number }}
          path: |
            ${{ steps.gen.outputs.outdir }}*
            output/*.digest.log

      - name: 校验证据包完整性
        if: steps.guard.outputs.skip != 'true'
        run: |
          OUT_DIR="${{ steps.gen.outputs.outdir }}"
          for name in source_manifest fact_ledger editorial_decision media_synthesis; do
            FILE="$OUT_DIR/$name.json"
            test -s "$FILE" || {
              echo "::error file=$FILE::缺少可审计证据文件"
              exit 1
            }
            jq -e 'type == "object"' "$FILE" >/dev/null || {
              echo "::error file=$FILE::证据文件不是有效 JSON 对象"
              exit 1
            }
          done
          jq -e '.sources | type == "array"' "$OUT_DIR/source_manifest.json" >/dev/null
          jq -e '.claims | type == "array"' "$OUT_DIR/fact_ledger.json" >/dev/null

          COVER_REPORT="$OUT_DIR/cover_visual.json"
          test -s "$COVER_REPORT" || {
            echo "::error file=$COVER_REPORT::日报封面缺少视觉质量报告"
            exit 1
          }
          COVER_FACTS="$OUT_DIR/cover_facts.json"
          test -s "$COVER_FACTS" || {
            echo "::error file=$COVER_FACTS::日报封面缺少本期头条事实包"
            exit 1
          }
          EXPECTED_MATCH_ID="$(jq -r '.match_id // empty' "$COVER_FACTS")"
          test -n "$EXPECTED_MATCH_ID" || {
            echo "::error file=$COVER_FACTS::本期头条事实包缺少 match_id"
            exit 1
          }
          jq -e \
            --arg expected_match_id "$EXPECTED_MATCH_ID" \
            --argjson minimum "${TENNISLIVE_COVER_VISUAL_MIN_SCORE:-72}" '
            (
              (
              .status == "selected"
              and .match_id == $expected_match_id
              and .headline_eligible == true
              and (.selected_player as $player | .match_players | index($player) != null)
              and .exact_match == true
              and .both_sides_match == true
              and (.scene | IN("match_action", "on_court_reaction", "solo_trophy", "prominent_person"))
              and (.quality_score >= $minimum)
              and (.quality.status == "pass")
              and (.quality.hard_failures | length == 0)
              and (.selected_asset_sha256 | test("^[0-9a-f]{64}$"))
              ) or (
              .status == "fallback"
              and .fallback_person == true
              and .headline_eligible == true
              and (.fallback_reason | length > 0)
              and (.quality.status | IN("pass", "fallback"))
              and (.quality.hard_failures | length == 0)
              )
            )
            and .render_binding.status == "bound"
            and .render_binding.renderer == "html-chromium"
            and .render_binding.card_file == "cards/card_00_cover.jpg"
            and (.render_binding.card_sha256 | test("^[0-9a-f]{64}$"))
          ' "$COVER_REPORT" >/dev/null || {
            echo "::error file=$COVER_REPORT::日报封面未通过素材、画质或最终 card_00 渲染绑定门禁"
            cat "$COVER_REPORT"
            exit 1
          }
          COVER_CARD="$OUT_DIR/$(jq -r '.render_binding.card_file' "$COVER_REPORT")"
          test -s "$COVER_CARD" || {
            echo "::error file=$COVER_REPORT::报告绑定的最终封面文件不存在"
            exit 1
          }
          EXPECTED_CARD_SHA="$(jq -r '.render_binding.card_sha256' "$COVER_REPORT")"
          ACTUAL_CARD_SHA="$(sha256sum "$COVER_CARD" | awk '{print $1}')"
          test "$ACTUAL_CARD_SHA" = "$EXPECTED_CARD_SHA" || {
            echo "::error file=$COVER_CARD::最终 card_00 与封面报告哈希不一致"
            exit 1
          }

          test -d "$OUT_DIR/knowledge" || {
            echo "::error::$OUT_DIR/knowledge 不存在，本次知识帖未生成"
            exit 1
          }
          if [ -d "$OUT_DIR/knowledge" ]; then
            for name in story evidence visual_sources visual_qa; do
              FILE="$OUT_DIR/knowledge/$name.json"
              test -s "$FILE" || {
                echo "::error file=$FILE::知识帖缺少 $name.json"
                exit 1
              }
            done
            jq -e '.status == "pass" and (.errors | length == 0)' \
              "$OUT_DIR/knowledge/visual_qa.json" >/dev/null || {
                echo "::error file=$OUT_DIR/knowledge/visual_qa.json::知识帖视觉质检未通过"
                cat "$OUT_DIR/knowledge/visual_qa.json"
                exit 1
              }
            jq -e '.status == "pass" and (.attempts | type == "array")' \
              "$OUT_DIR/knowledge/visual_sources.json" >/dev/null || {
                echo "::error file=$OUT_DIR/knowledge/visual_sources.json::知识帖素材来源清单无效"
                cat "$OUT_DIR/knowledge/visual_sources.json"
                exit 1
              }
            test "$(find "$OUT_DIR/knowledge/cards" -maxdepth 1 -type f -name 'card_*.jpg' | wc -l)" -eq 4 || {
              echo "::error::知识帖必须完整生成 4 张卡片"
              exit 1
            }
          fi

      - name: 提交内容到仓库
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "content: 每日速报 $(basename '${{ steps.gen.outputs.outdir }}')"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: 上传内容包 artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: ${{ steps.gen.outputs.outdir }}

      - name: PushPlus 推送到微信（配置了 PUSHPLUS_TOKEN 才执行）
        if: (github.event_name != 'push' || contains(github.event.head_commit.message, '[pushplus]')) && github.event.inputs.push_scope != 'knowledge-only' && github.event.inputs.push_scope != 'none' && steps.guard.outputs.skip != 'true' && env.PUSHPLUS_TOKEN != ''
        continue-on-error: true  # 推送失败不影响内容生成与入库
        run: |
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          tennislive publish pushplus --dir "${{ steps.gen.outputs.outdir }}"

      - name: PushPlus 单独推送每日网球知识
        if: (github.event_name != 'push' || contains(github.event.head_commit.message, '[pushplus]')) && github.event.inputs.push_scope != 'main-only' && github.event.inputs.push_scope != 'none' && steps.guard.outputs.skip != 'true' && env.PUSHPLUS_TOKEN != ''
        continue-on-error: true
        run: |
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          if [ -s "${{ steps.gen.outputs.outdir }}/knowledge/push.html" ]; then
            tennislive publish pushplus --dir "${{ steps.gen.outputs.outdir }}/knowledge"
          else
            echo "本期无独立知识包，跳过"
          fi

      - name: 公众号存草稿/发布（WECHAT_MODE=draft 或 publish 才执行）
        if: github.event_name != 'push' && github.event.inputs.push_scope != 'knowledge-only' && github.event.inputs.push_scope != 'none' && steps.guard.outputs.skip != 'true' && env.WECHAT_APPID != '' && env.WECHAT_MODE != 'off'
        continue-on-error: true
        run: |
          EXTRA=""
          if [ "$WECHAT_MODE" = "publish" ]; then EXTRA="--publish"; fi
          tennislive publish wechat --dir "${{ steps.gen.outputs.outdir }}" \
            --style "$WECHAT_STYLE" $EXTRA

      - name: 上传日报失败诊断包
        if: failure() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-failure-final-${{ github.run_number }}
          path: |
            ${{ steps.gen.outputs.outdir }}*
            output/*.digest.log
