name: daily-tennis-digest

# 每天北京时间早间生成内容包（昨夜赛果 + 今日赛程）。这是材料生成
# 窗口，不是强制发布时间；提交回仓库并按配置推送，也可手动触发。
# GitHub 定时任务在 :00/:30 高峰时段可能被延迟或丢弃，
# 因此：主班次避开热门分钟 + 备份班次带幂等检查兜底。
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily.yml"
      - "assets/venues/**"
      - "data/venue_assets.json"
      - "data/official_schedule_sources.json"
      - "src/tennislive/sources/**"
      - "src/tennislive/models.py"
      - "pyproject.toml"
      - "src/tennislive/render/**"
      - "src/tennislive/video/**"
      - "src/tennislive/cli.py"
  schedule:
    - cron: "17 23 * * *"   # 主班次：23:17 UTC = 次日 07:17 北京时间
    - cron: "5 0 * * *"     # 备份班次：00:05 UTC = 08:05 北京时间（当日已生成则跳过）
  workflow_dispatch:
    inputs:
      date:
        description: "基准日期（YYYY-MM-DD，北京时间；留空=今天）"
        required: false
        default: ""

permissions:
  contents: write
  models: read

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 发布相关 Secrets（未配置则对应步骤自动跳过）
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      WECHAT_API_PROXY: ${{ secrets.WECHAT_API_PROXY }}
      # 公众号模式：off（默认，只生成文件）/ draft（存草稿箱）/ publish（直接发布）
      WECHAT_MODE: ${{ vars.WECHAT_MODE || 'off' }}
      # 卡片主题：dark=品牌深绿（默认）/ light=奶油浅色
      TENNISLIVE_THEME: ${{ vars.TENNISLIVE_THEME || 'dark' }}
      # 公众号样式：pic=图片消息（小红书式竖图+文字，默认）/ article=传统图文
      WECHAT_STYLE: ${{ vars.WECHAT_STYLE || 'pic' }}
      # 授权赛后技术统计（未配置时自动降级为比分结构复盘）
      SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
      SPORTRADAR_ACCESS_LEVEL: ${{ vars.SPORTRADAR_ACCESS_LEVEL || 'trial' }}
      # 无需额外 AI key：GitHub Models 只改写已有证据，不检索或编造新闻。
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1' }}
      TENNISLIVE_AI_EDITORIAL: ${{ vars.TENNISLIVE_AI_EDITORIAL || 'off' }}
      # 从官方巡回赛视频页选择与当日球员相关的片段，生成中文竖版视频。
      TENNISLIVE_OFFICIAL_VIDEO: ${{ vars.TENNISLIVE_OFFICIAL_VIDEO || 'on' }}
    steps:
      - uses: actions/checkout@v4

      - name: 幂等检查（备份班次：当日内容已存在则跳过）
        id: guard
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          QA_FILE="output/$TODAY/qa.txt"
          if [ "${{ github.event_name }}" = "schedule" ] \
             && [ -f "output/$TODAY/digest.json" ] \
             && [ -f "$QA_FILE" ] \
             && ! grep -q '^\[FATAL\]' "$QA_FILE"; then
            echo "今日内容已生成且通过质量闸门，本次跳过"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装中文字体（卡片图需要）
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装 tennislive
        if: steps.guard.outputs.skip != 'true'
        run: pip install -q -e ".[webrender]"

      - name: 缓存 Chromium（HTML 卡片渲染）
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: 安装 Chromium
        if: steps.guard.outputs.skip != 'true'
        run: python -m playwright install --with-deps chromium

      - name: 安装视频渲染器
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 生成每日内容包
        if: steps.guard.outputs.skip != 'true'
        id: gen
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then DATE_ARG="today"; fi
          # 计算实际输出目录（北京时间日期）
          OUT_DIR=$(python -c "from tennislive.timeutil import parse_date_arg; print('output/' + parse_date_arg('$DATE_ARG').isoformat())")
          echo "outdir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          set +e
          tennislive digest --date "$DATE_ARG" --outdir output 2>&1 | tee "$OUT_DIR.digest.log"
          CODE=${PIPESTATUS[0]}
          if [ -f "$OUT_DIR/qa.txt" ]; then
            echo "----- qa.txt -----"
            cat "$OUT_DIR/qa.txt"
          fi
          if [ "$CODE" -ne 0 ]; then
            exit "$CODE"
          fi
          ls -la "$OUT_DIR"

      - name: Upload digest failure diagnostics
        if: failure() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-failure-${{ github.run_number }}
          path: |
            ${{ steps.gen.outputs.outdir }}*
            output/*.digest.log

      - name: 校验证据包完整性
        if: steps.guard.outputs.skip != 'true'
        run: |
          OUT_DIR="${{ steps.gen.outputs.outdir }}"
          for name in source_manifest fact_ledger editorial_decision media_synthesis; do
            FILE="$OUT_DIR/$name.json"
            test -s "$FILE" || {
              echo "::error file=$FILE::缺少可审计证据文件"
              exit 1
            }
            jq -e 'type == "object"' "$FILE" >/dev/null || {
              echo "::error file=$FILE::证据文件不是有效 JSON 对象"
              exit 1
            }
          done
          jq -e '.sources | type == "array"' "$OUT_DIR/source_manifest.json" >/dev/null
          jq -e '.claims | type == "array"' "$OUT_DIR/fact_ledger.json" >/dev/null

      - name: 提交内容到仓库
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "content: 每日速报 $(basename '${{ steps.gen.outputs.outdir }}')"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: 上传内容包 artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: ${{ steps.gen.outputs.outdir }}

      - name: PushPlus 推送到微信（配置了 PUSHPLUS_TOKEN 才执行）
        if: steps.guard.outputs.skip != 'true' && env.PUSHPLUS_TOKEN != ''
        continue-on-error: true  # 推送失败不影响内容生成与入库
        run: |
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          tennislive publish pushplus --dir "${{ steps.gen.outputs.outdir }}"

      - name: PushPlus 单独推送每日网球知识
        if: steps.guard.outputs.skip != 'true' && env.PUSHPLUS_TOKEN != ''
        continue-on-error: true
        run: |
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          if [ -s "${{ steps.gen.outputs.outdir }}/knowledge/push.html" ]; then
            tennislive publish pushplus --dir "${{ steps.gen.outputs.outdir }}/knowledge"
          else
            echo "本期无独立知识包，跳过"
          fi

      - name: 公众号存草稿/发布（WECHAT_MODE=draft 或 publish 才执行）
        if: steps.guard.outputs.skip != 'true' && env.WECHAT_APPID != '' && env.WECHAT_MODE != 'off'
        continue-on-error: true
        run: |
          EXTRA=""
          if [ "$WECHAT_MODE" = "publish" ]; then EXTRA="--publish"; fi
          tennislive publish wechat --dir "${{ steps.gen.outputs.outdir }}" \
            --style "$WECHAT_STYLE" $EXTRA
