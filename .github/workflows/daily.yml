name: daily-tennis-digest

# 每天北京时间 07:30 生成晨报（昨夜赛果 + 今日赛程），
# 提交回仓库，并按配置全自动推送/发布。
# 注意：GitHub 定时任务可能有 10~30 分钟延迟。
on:
  schedule:
    - cron: "30 23 * * *"   # 23:30 UTC = 次日 07:30 北京时间
  workflow_dispatch:
    inputs:
      date:
        description: "基准日期（YYYY-MM-DD，北京时间；留空=今天）"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 发布相关 Secrets（未配置则对应步骤自动跳过）
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      WECHAT_API_PROXY: ${{ secrets.WECHAT_API_PROXY }}
      # 公众号模式：off（默认，只生成文件）/ draft（存草稿箱）/ publish（直接发布）
      WECHAT_MODE: ${{ vars.WECHAT_MODE || 'off' }}
      # 公众号样式：pic=图片消息（小红书式竖图+文字，默认）/ article=传统图文
      WECHAT_STYLE: ${{ vars.WECHAT_STYLE || 'pic' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装中文字体（卡片图需要）
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装 tennislive
        run: pip install -q -e .

      - name: 生成每日内容包
        id: gen
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then DATE_ARG="today"; fi
          tennislive digest --date "$DATE_ARG" --outdir output
          # 计算实际输出目录（北京时间日期）
          OUT_DIR=$(python -c "from tennislive.timeutil import parse_date_arg; print('output/' + parse_date_arg('$DATE_ARG').isoformat())")
          echo "outdir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$OUT_DIR"

      - name: 提交内容到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "content: 每日速报 $(basename '${{ steps.gen.outputs.outdir }}')"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: 上传内容包 artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: ${{ steps.gen.outputs.outdir }}

      - name: PushPlus 推送到微信（配置了 PUSHPLUS_TOKEN 才执行）
        if: env.PUSHPLUS_TOKEN != ''
        continue-on-error: true  # 推送失败不影响内容生成与入库
        run: tennislive publish pushplus --dir "${{ steps.gen.outputs.outdir }}"

      - name: 公众号存草稿/发布（WECHAT_MODE=draft 或 publish 才执行）
        if: env.WECHAT_APPID != '' && env.WECHAT_MODE != 'off'
        continue-on-error: true
        run: |
          EXTRA=""
          if [ "$WECHAT_MODE" = "publish" ]; then EXTRA="--publish"; fi
          tennislive publish wechat --dir "${{ steps.gen.outputs.outdir }}" \
            --style "$WECHAT_STYLE" $EXTRA
