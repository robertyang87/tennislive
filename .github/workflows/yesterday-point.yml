name: yesterday-tennis-point

on:
  schedule:
    # ATP、WTA 官方视频上架时间不同步，四班次独立重试：一方先有素材先推送，
    # 另一方留到下一班次继续找，互不等待。已经成功的巡回赛后续班次会被跳过，
    # 不重复生成也不重复推送（见 cmd_yesterday_point 的 skip_tours 逻辑）。
    - cron: "23 1 * * *"    # 北京时间 09:23（首班）
    - cron: "23 4 * * *"    # 北京时间 12:23（重试）
    - cron: "23 7 * * *"    # 北京时间 15:23（重试）
    - cron: "23 11 * * *"   # 北京时间 19:23（末班）
  workflow_dispatch:
    inputs:
      date:
        description: "发布日期（YYYY-MM-DD，北京时间；留空=今天）"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/yesterday-point.yml"
      - "src/tennislive/video/daily_point.py"
      - "src/tennislive/video/official.py"
      - "src/tennislive/video/pipeline.py"
      - "src/tennislive/cli.py"
      - "tests/test_daily_point.py"

permissions:
  contents: write

concurrency:
  group: yesterday-tennis-point
  cancel-in-progress: false

jobs:
  point:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      TENNISLIVE_YESTERDAY_POINT: "on"
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      # Optional official Tennis TV entitlement token. The workflow never
      # reads browser cookies; without this token it falls back to public ATP,
      # WTA and Grand Slam mirrors and records a clean skip if none is usable.
      TENNISTV_JWT: ${{ secrets.TENNISTV_JWT }}
    steps:
      - uses: actions/checkout@v4

      - name: 手动任务同步最新主分支
        if: github.event_name == 'workflow_dispatch'
        run: git pull --ff-only origin "${{ github.ref_name }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          pip install -q -e ".[dev,video]"
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk

      - name: 校验昨日好球规则
        run: pytest -q tests/test_daily_point.py tests/test_official_video.py

      - name: 生成独立视频包
        id: generate
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then DATE_ARG="today"; fi
          DATE_DIR=$(python -c "from tennislive.timeutil import parse_date_arg; print(parse_date_arg('$DATE_ARG').isoformat())")
          OUT_DIR="output/$DATE_DIR/yesterday-point"
          echo "outdir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          # 不清空 OUT_DIR：已提交的 atp/wta 内容要留在工作区，
          # 这样 CLI 才能识别出哪个巡回赛这次该跳过、哪个还要继续找。
          tennislive point --date "$DATE_ARG" --outdir output

      - name: 严格质量门禁
        run: |
          OUT_DIR="${{ steps.generate.outputs.outdir }}"
          MANIFEST="$OUT_DIR/manifest.json"
          test -s "$MANIFEST"
          STATUS=$(jq -r '.status' "$MANIFEST")
          if [ "$STATUS" = "skipped" ]; then
            echo "::notice::ATP 与 WTA 当日均无可验证的官方完整回合"
            exit 0
          fi
          test "$STATUS" = "pass"
          for TOUR in atp wta; do
            TOUR_UPPER=$(echo "$TOUR" | tr '[:lower:]' '[:upper:]')
            TOUR_STATUS=$(jq -r --arg t "$TOUR_UPPER" '.tours[$t] // "skipped"' "$MANIFEST")
            if [ "$TOUR_STATUS" != "pass" ]; then
              echo "::notice::$TOUR_UPPER 当日无可验证的官方完整回合，跳过该巡回赛门禁"
              continue
            fi
            TDIR="$OUT_DIR/$TOUR"
            TMANIFEST="$TDIR/manifest.json"
            test -s "$TMANIFEST"
            jq -e '
              .status == "pass" and
              .complete_rally.verified == true and
              .complete_rally.montage == false and
              .complete_rally.source_window_ms[0] == 0 and
              .consensus.verified == true and
              (
                (.consensus.rank == 3 and
                 .consensus.score == 100 and
                 .consensus.basis == "official-daily-best" and
                 any(.consensus.signals[];
                     .kind == "official-best-designation" and .scope == "day")) or
                (.consensus.rank == 1 and
                 .consensus.score == 72 and
                 .consensus.basis == "official-hot-shot" and
                 any(.consensus.signals[];
                     .kind == "official-hot-shot" and .scope == "hot-shot"))
              ) and
              .framing.mode == "contain" and
              .framing.dynamic_tracking_crop == false and
              (.source_resolution | length) == 2
            ' "$TMANIFEST" >/dev/null
            test -s "$TDIR/yesterday-point.mp4"
            test -s "$TDIR/yesterday-point.zh-CN.srt"
            test -s "$TDIR/xiaohongshu.txt"
            test -s "$TDIR/copy.html"
            test -s "$TDIR/push.html"
            test "$(grep -c '^$' "$TDIR/xiaohongshu.txt")" -eq 1
            ! grep -Eq '来源：|图源：|摄影/图源|非商业资料引用' \
              "$TDIR/xiaohongshu.txt" "$TDIR/copy.html" \
              "$TDIR/push.html" "$TDIR/yesterday-point.zh-CN.srt"
            ffprobe -v error -select_streams v:0 \
              -show_entries stream=width,height \
              -of csv=s=x:p=0 "$TDIR/yesterday-point.mp4" | grep -qx '1080x1440'
          done

      - name: 上传独立内容包
        uses: actions/upload-artifact@v4
        with:
          name: yesterday-point-${{ github.run_number }}
          path: ${{ steps.generate.outputs.outdir }}

      - name: 提交通过门禁的成片
        id: commit
        if: github.event_name != 'push'
        run: |
          echo "ready=false" >> "$GITHUB_OUTPUT"
          OUT_DIR="${{ steps.generate.outputs.outdir }}"
          if [ "$(jq -r '.status' "$OUT_DIR/manifest.json")" != "pass" ]; then
            echo "没有满足门槛的完整回合，不提交空包"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUT_DIR"
          if git diff --cached --quiet; then
            echo "内容与仓库一致，不重复提交或推送"
            exit 0
          fi
          git commit -m "content: 昨日好球 $(basename "$(dirname "$OUT_DIR")")"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "${{ github.ref_name }}"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: PushPlus 推送昨日 Hot Shots / 最佳回合（只推本次新完成的巡回赛）
        if: steps.commit.outputs.ready == 'true' && env.PUSHPLUS_TOKEN != ''
        continue-on-error: true
        run: |
          OUT_DIR="${{ steps.generate.outputs.outdir }}"
          export TENNISLIVE_ASSET_REV="$(git rev-parse HEAD)"
          # 只推 fresh_tours：之前班次已经推送过的巡回赛即使仍是 pass 也不会
          # 再进这个列表，避免同一份内容重复推送到微信。
          FRESH=$(jq -r '.fresh_tours[]? // empty' "$OUT_DIR/manifest.json" | tr '[:upper:]' '[:lower:]')
          if [ -z "$FRESH" ]; then
            echo "本次没有新完成的巡回赛，跳过推送"
            exit 0
          fi
          for TOUR in $FRESH; do
            tennislive publish pushplus --dir "$OUT_DIR/$TOUR" \
              || echo "::warning::$TOUR PushPlus 推送失败"
          done
